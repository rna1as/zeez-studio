<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7aa7" />
  <meta name="description" content="ZEEZ Studio custom keycap keychain simulator" />
  <title>ZEEZ Studio — Keycap Customizer</title>
  <style>
    :root{
      --bg:#fff7fb;
      --card:#ffffff;
      --ink:#221d26;
      --muted:#746b78;
      --line:#efe2eb;
      --brand:#ff0a8a;
      --brand2:#8edaf5;
      --brand3:#bca4ff;
      --shadow:0 18px 50px rgba(70, 37, 63, .14);
      --radius:24px;
      --tabBorder:#111111;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 16% 3%, rgba(255,122,167,.28), transparent 30%),
        radial-gradient(circle at 90% 0%, rgba(142,218,245,.34), transparent 28%),
        radial-gradient(circle at 70% 85%, rgba(188,164,255,.32), transparent 35%),
        var(--bg);
      overflow-x:hidden;
    }
    button,input,select{font:inherit}
    .app{max-width:1180px;margin:0 auto;padding:18px 16px 34px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 0 18px;
      position:sticky;top:0;z-index:20;
      background:linear-gradient(to bottom, rgba(255,247,251,.96), rgba(255,247,251,.70), transparent);
      backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:48px;height:48px;border-radius:16px;
      background:linear-gradient(135deg,var(--brand),var(--brand3));
      display:grid;place-items:center;box-shadow:0 12px 24px rgba(255,122,167,.24);
      color:#fff;font-weight:1000;letter-spacing:-1px;
    }
    .brand h1{font-size:20px;line-height:1;margin:0;font-weight:1000;letter-spacing:-.4px}
    .brand p{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:minmax(0, 1fr) 420px;gap:18px;align-items:start}
    .panel,.previewPanel{
      border:1px solid rgba(255,255,255,.75);
      background:rgba(255,255,255,.82);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel{padding:18px}
    .previewPanel{position:sticky;top:82px;padding:16px}
    .tabBar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .mainTab{
      min-height:52px;border:2.5px solid var(--tabBorder);border-radius:18px;background:#fff;
      color:#697182;font-weight:1000;font-size:15px;letter-spacing:.2px;cursor:pointer;
      box-shadow:4px 6px 0 #000;transition:.15s transform,.15s box-shadow,.15s background,.15s color;
    }
    .mainTab:active{transform:translate(2px,2px);box-shadow:2px 3px 0 #000}
    .mainTab.active{background:linear-gradient(180deg,#ff1496,#e4007c);color:#fff}
    .tabPanel{display:none}
    .tabPanel.active{display:block}
    .sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
    .sectionTitle h2{font-size:15px;margin:0;font-weight:1000;letter-spacing:-.2px}
    .sectionTitle small{color:var(--muted);font-size:12px;font-weight:700}
    .field{display:grid;gap:8px}
    input,select{
      width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;padding:13px 14px;
      color:var(--ink);outline:none;font-weight:850;
    }
    input:focus,select:focus{border-color:rgba(255,122,167,.70);box-shadow:0 0 0 4px rgba(255,122,167,.12)}
    .palette{display:flex;flex-wrap:wrap;gap:10px}
    .swatch{
      --frame-color:#ddd;
      border:2px solid #111;background:var(--frame-color);border-radius:16px;padding:0 14px;cursor:pointer;text-align:center;
      box-shadow:3px 4px 0 #000;min-height:58px;min-width:116px;display:inline-flex;gap:8px;justify-content:center;align-items:center;
      transition:.15s transform,.15s box-shadow,.15s background,.15s filter;
    }
    .swatch:active{transform:translate(2px,2px);box-shadow:1px 2px 0 #000}
    .swatch.active{background:var(--frame-color);box-shadow:inset 0 0 0 4px var(--brand), 3px 4px 0 #000}
    .dot{display:none}
    .swatch span:last-child{font-size:12px;font-weight:1000;color:inherit;line-height:1.2;text-align:center;white-space:nowrap}
    .subTabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .subTab{
      min-height:44px;border:2px solid #111;border-radius:16px;background:#fff;color:#6c7482;font-weight:1000;cursor:pointer;
      box-shadow:3px 4px 0 #000;transition:.15s transform,.15s box-shadow,.15s background,.15s color;
    }
    .subTab:active{transform:translate(2px,2px);box-shadow:1px 2px 0 #000}
    .subTab.active{background:linear-gradient(180deg,#ff1496,#e4007c);color:#fff}
    .editorCard{
      border:1px solid var(--line);border-radius:20px;background:#fff;padding:14px;
      box-shadow:0 10px 18px rgba(69,35,62,.05);
    }
    .editorTop{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}
    .editorLabel{font-size:13px;font-weight:1000}
    .smallBtn,.btn{
      min-height:42px;border:0;border-radius:16px;background:#fff;color:var(--ink);
      box-shadow:inset 0 0 0 1px var(--line), 0 8px 16px rgba(69,35,62,.06);
      cursor:pointer;font-weight:950;transition:.15s transform,.15s box-shadow,.15s background;
    }
    .smallBtn:active,.btn:active{transform:scale(.98)}
    .smallBtn{padding:10px 12px;font-size:12px}
    .slotHint{display:inline-flex;align-items:center;justify-content:center;min-width:60px;height:60px;border-radius:18px;background:linear-gradient(180deg,#ff1496,#e4007c);color:#fff;font-size:24px;font-weight:1000;border:2px solid #111;box-shadow:4px 5px 0 #000}
    .helper{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.4}
    .hidden{display:none!important}
    .previewWrap{
      background:linear-gradient(45deg, rgba(255,122,167,.08), rgba(142,218,245,.10)), #fff;
      border-radius:26px;border:1px solid var(--line);padding:10px;display:grid;place-items:center;min-height:520px;
      position:relative;overflow:hidden;
    }
    .previewWrap::before,.previewWrap::after{content:"";position:absolute;border-radius:999px;filter:blur(1px);opacity:.55}
    .previewWrap::before{width:170px;height:170px;background:rgba(255,218,92,.20);left:-70px;top:80px}
    .previewWrap::after{width:150px;height:150px;background:rgba(188,164,255,.18);right:-60px;bottom:80px}
    #previewSvg{position:relative;z-index:1;max-width:100%;height:auto;filter:drop-shadow(0 20px 24px rgba(35,24,42,.18))}
    .actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
    .btn{padding:13px 14px;background:#fff;font-weight:1000;display:flex;justify-content:center;align-items:center;gap:8px;text-decoration:none;color:var(--ink)}
    .btn.blue{background:linear-gradient(135deg,var(--brand2),var(--brand3));color:#fff;box-shadow:0 14px 26px rgba(142,218,245,.25)}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(80px);opacity:0;background:#221d26;color:#fff;padding:12px 14px;border-radius:999px;z-index:99;font-weight:900;font-size:13px;box-shadow:0 18px 34px rgba(0,0,0,.18);transition:.25s}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
      .previewPanel{position:relative;top:auto}
      .previewWrap{min-height:430px}
      .app{padding-bottom:90px}
      .topbar{padding-top:8px}
      .brand h1{font-size:18px}
    }
    @media (max-width: 520px){
      .app{padding-left:10px;padding-right:10px}
      .panel,.previewPanel{border-radius:22px;padding:12px}
      .tabBar{gap:8px}
      .mainTab{min-height:48px;font-size:14px}
      .subTabs{gap:8px}
      .swatch{min-height:54px;min-width:100px;padding:0 12px}
      .previewWrap{min-height:380px;padding:0}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">ZS</div>
        <div>
          <h1>ZEEZ Studio</h1>
          <p>Custom keycap keychain simulator</p>
        </div>
      </div>
    </header>

    <main class="grid">
      <section class="panel" aria-label="Customizer controls">
        <div class="tabBar">
          <button class="mainTab active" id="tabTextBtn" type="button">TEXT</button>
          <button class="mainTab" id="tabCaseBtn" type="button">CASE</button>
          <button class="mainTab" id="tabColorsBtn" type="button">COLORS</button>
        </div>

        <div class="tabPanel active" id="tabTextPanel">
          <div class="field">
            <input id="textInput" maxlength="9" value="ZEEZ" placeholder="Tulis nama / teks" autocomplete="off" style="text-transform:uppercase" />
          </div>
        </div>

        <div class="tabPanel" id="tabCasePanel">
          <div class="sectionTitle"><h2>Warna case</h2><small>body / frame</small></div>
          <div class="palette" id="casePalette"></div>
        </div>

        <div class="tabPanel" id="tabColorsPanel">
          <div class="subTabs">
            <button class="subTab active" id="modeKeycapsBtn" type="button">KEYCAPS</button>
            <button class="subTab" id="modeTextBtn" type="button">TEXT</button>
          </div>

          <div class="editorCard">
            <div class="editorTop">
              <div>
                <div class="editorLabel" id="editorTitle">Warna keycap</div>
                <div class="helper" id="editorSubtitle">Pilih slot lalu tentukan warnanya.</div>
              </div>
              <div class="slotHint" id="slotHint">Z</div>
            </div>
            <div class="row">
              <select id="activeColorSlotSelect" aria-label="Pilih slot warna"></select>
              <button class="smallBtn" id="applyAllColorBtn" type="button">Terapkan ke semua</button>
            </div>
            <div class="palette" id="colorPalette"></div>
          </div>
        </div>
      </section>

      <aside class="previewPanel" aria-label="Live preview">
        <div class="previewWrap">
          <svg id="previewSvg" width="360" height="590" viewBox="0 0 360 590" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Preview custom keycap"></svg>
        </div>
        <div class="actions">
          <button class="btn blue" id="saveImageBtn" type="button">💾 Simpan gambar</button>
        </div>
      </aside>
    </main>
  </div>
  <div class="toast" id="toast">Berhasil</div>

  <script>
    const palette = [
      {name:'Black', hex:'#1C1C1C'},
      {name:'White', hex:'#F7F7F4'},
      {name:'Cream', hex:'#F1E3C8'},
      {name:'Sky Blue', hex:'#8FD3FF'},
      {name:'Blue', hex:'#3E7BFA'},
      {name:'Olive Green', hex:'#73824D'},
      {name:'Holly Green', hex:'#0F6B4B'},
      {name:'Red', hex:'#C92B2B'},
      {name:'Orange', hex:'#F28B2E'},
      {name:'Sakura Pink', hex:'#F6B7C8'},
      {name:'Fuschia', hex:'#D93D8E'},
      {name:'Grey', hex:'#A6A6A6'},
      {name:'Dark Grey', hex:'#595959'},
      {name:'Yellow', hex:'#F2D64B'},
      {name:'Coklat', hex:'#8B5A3C'},
      {name:'Silver', hex:'#C8CDD3'}
    ];

    const state = {
      text: 'ZEEZ',
      caseColor: palette[2],
      keyColors: [palette[1], palette[9], palette[3], palette[5], palette[14], palette[15], palette[7], palette[10], palette[13]],
      legendColors: Array(9).fill(palette[0]),
      activeTab: 'text',
      colorMode: 'keycaps',
      activeColorSlot: 0
    };

    const $ = (id) => document.getElementById(id);
    const svg = $('previewSvg');

    function toast(msg){
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(window.__toast);
      window.__toast = setTimeout(()=>el.classList.remove('show'), 1800);
    }

    function graphemes(str){
      const compact = (str || '').replace(/\s+/g, '');
      if(window.Intl && Intl.Segmenter){
        const seg = new Intl.Segmenter('id', {granularity:'grapheme'});
        return Array.from(seg.segment(compact), s=>s.segment);
      }
      return Array.from(compact);
    }

    function clampSlots(n){ return Math.max(1, Math.min(9, n)); }
    function activeSlots(){ return clampSlots(graphemes(state.text).length || 1); }
    function charsForSlots(){
      const chars = graphemes(state.text).slice(0, 9);
      const slots = activeSlots();
      const result = [];
      for(let i=0;i<slots;i++) result.push(chars[i] || '');
      return result;
    }

    function brightness(hex){
      const h = hex.replace('#','');
      const r=parseInt(h.substring(0,2),16), g=parseInt(h.substring(2,4),16), b=parseInt(h.substring(4,6),16);
      return (r*299+g*587+b*114)/1000;
    }


    function readableText(hex){
      return brightness(hex) > 155 ? '#111111' : '#ffffff';
    }

    function shade(hex, pct){
      const h = hex.replace('#','');
      let r=parseInt(h.substring(0,2),16), g=parseInt(h.substring(2,4),16), b=parseInt(h.substring(4,6),16);
      const t = pct < 0 ? 0 : 255;
      const p = Math.abs(pct) / 100;
      r = Math.round((t-r)*p+r); g = Math.round((t-g)*p+g); b = Math.round((t-b)*p+b);
      return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    }

    function hashCode(str){
      let h = 2166136261;
      for(let i=0;i<str.length;i++){
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return (h >>> 0).toString(36).toUpperCase().slice(0,6);
    }

    function currentConfig(){
      const slots = activeSlots();
      return {
        text: charsForSlots().join(''),
        slots,
        case: state.caseColor.name,
        keys: state.keyColors.slice(0, slots).map(c=>c.name),
        legends: state.legendColors.slice(0, slots).map(c=>c.name)
      };
    }

    function orderCode(){
      const cfg = currentConfig();
      return `ZEEZ-${cfg.slots}${hashCode(JSON.stringify(cfg))}`;
    }

    function buildPalette(containerId, colors, getActive, onClick){
      const wrap = $(containerId);
      wrap.innerHTML='';
      colors.forEach((c,idx)=>{
        const b=document.createElement('button');
        b.className='swatch';
        b.type='button';
        b.title=c.name;
        b.style.setProperty('--frame-color', c.hex);
        b.style.color = readableText(c.hex);
        b.innerHTML=`<span class="dot"></span><span>${c.name}</span>`;
        if(getActive(c,idx)) b.classList.add('active');
        b.onclick=()=>onClick(c,idx);
        wrap.appendChild(b);
      });
    }

    function updateColorSlotSelect(){
      const sel = $('activeColorSlotSelect');
      const slots = activeSlots();
      const chars = charsForSlots();
      sel.innerHTML='';
      for(let i=0;i<slots;i++){
        const opt=document.createElement('option');
        opt.value=i;
        opt.textContent=`Slot ${i+1} (${chars[i] || '-'})`;
        sel.appendChild(opt);
      }
      state.activeColorSlot = Math.min(state.activeColorSlot, slots - 1);
      sel.value = state.activeColorSlot;
      $('slotHint').textContent = chars[state.activeColorSlot] || '?';
    }

    function syncTabs(){
      const tabs = ['text','case','colors'];
      tabs.forEach(name => {
        $(`tab${name.charAt(0).toUpperCase()+name.slice(1)}Btn`).classList.toggle('active', state.activeTab === name);
        $(`tab${name.charAt(0).toUpperCase()+name.slice(1)}Panel`).classList.toggle('active', state.activeTab === name);
      });
      $('modeKeycapsBtn').classList.toggle('active', state.colorMode === 'keycaps');
      $('modeTextBtn').classList.toggle('active', state.colorMode === 'text');
      $('editorTitle').textContent = state.colorMode === 'keycaps' ? 'Warna keycap' : 'Warna huruf';
      $('editorSubtitle').textContent = state.colorMode === 'keycaps' ? 'Pilih slot lalu tentukan warna keycap.' : 'Pilih slot lalu tentukan warna huruf.';
    }

    function renderColorEditor(){
      updateColorSlotSelect();
      if(state.colorMode === 'keycaps'){
        buildPalette('colorPalette', palette, c => (state.keyColors[state.activeColorSlot] || {}).name === c.name, c => {
          state.keyColors[state.activeColorSlot] = c;
          update();
        });
      } else {
        buildPalette('colorPalette', palette, c => (state.legendColors[state.activeColorSlot] || {}).name === c.name, c => {
          state.legendColors[state.activeColorSlot] = c;
          update();
        });
      }
    }

    function renderSvg(){
      const slots = activeSlots();
      const chars = charsForSlots();
      const h = Math.max(360, slots*72 + 210);
      svg.setAttribute('height', h);
      svg.setAttribute('viewBox', `0 0 360 ${h}`);
      const shellX = 111;
      const shellY = 116;
      const shellW = 138;
      const keyW = 58;
      const keyH = 58;
      const gap = 12;
      const innerPadTop = 21;
      const bodyH = slots*keyH + (slots-1)*gap + innerPadTop*2;
      const bodyY = shellY;
      const keyX = shellX + (shellW-keyW)/2;
      const ringCx = 180;
      const ringCy = 48;
      const caseFill = state.caseColor.hex;
      const darker = shade(caseFill, -18);
      const lighter = shade(caseFill, 25);
      let defs = `<defs>
        <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8f8f8"/><stop offset=".48" stop-color="#9b9b9b"/><stop offset="1" stop-color="#f2f2f2"/></linearGradient>
        <linearGradient id="caseGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${lighter}"/><stop offset=".55" stop-color="${caseFill}"/><stop offset="1" stop-color="${darker}"/></linearGradient>
        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#24172b" flood-opacity=".22"/></filter>
      </defs>`;
      let out = `${defs}
        <rect width="360" height="${h}" rx="28" fill="#fff7fb"/>
        <circle cx="58" cy="90" r="34" fill="#FFE2EC" opacity=".75"/>
        <circle cx="296" cy="${h-92}" r="48" fill="#E7F8FF" opacity=".82"/>
        <circle cx="${ringCx}" cy="${ringCy}" r="28" fill="none" stroke="url(#metal)" stroke-width="9"/>
        <circle cx="${ringCx}" cy="${ringCy}" r="17" fill="none" stroke="#ffffff" stroke-opacity=".45" stroke-width="3"/>
        <path d="M180 78 C180 91 180 99 180 111" fill="none" stroke="url(#metal)" stroke-width="8" stroke-linecap="round"/>
        <circle cx="180" cy="94" r="7" fill="url(#metal)"/>
        <g filter="url(#softShadow)">
          <rect x="${shellX}" y="${bodyY}" width="${shellW}" height="${bodyH}" rx="24" fill="url(#caseGrad)"/>
          <rect x="${shellX+9}" y="${bodyY+10}" width="${shellW-18}" height="${bodyH-20}" rx="18" fill="#101017" opacity=".16"/>
          <rect x="${shellX+13}" y="${bodyY+14}" width="${shellW-26}" height="${bodyH-28}" rx="16" fill="#ffffff" opacity=".14"/>
        </g>`;
      for(let i=0;i<slots;i++){
        const y = bodyY + innerPadTop + i*(keyH+gap);
        const color = state.keyColors[i] || palette[0];
        const fill = color.hex;
        const keyDark = shade(fill, -12);
        const keyLight = shade(fill, 28);
        const textFill = (state.legendColors[i] || palette[0]).hex;
        const stroke = brightness(fill) > 180 ? 'rgba(0,0,0,.12)' : 'rgba(255,255,255,.16)';
        const fontSize = chars[i] && chars[i].length > 1 ? 24 : 30;
        out += `
          <g>
            <rect x="${keyX+4}" y="${y+6}" width="${keyW}" height="${keyH}" rx="13" fill="#000" opacity=".13"/>
            <rect x="${keyX}" y="${y}" width="${keyW}" height="${keyH}" rx="14" fill="${keyDark}"/>
            <rect x="${keyX+5}" y="${y+4}" width="${keyW-10}" height="${keyH-11}" rx="12" fill="${fill}" stroke="${stroke}" stroke-width="1"/>
            <path d="M${keyX+12} ${y+8} H${keyX+keyW-12} Q${keyX+keyW-4} ${y+8} ${keyX+keyW-8} ${y+18} L${keyX+keyW-16} ${y+34} Q${keyX+keyW-20} ${y+42} ${keyX+keyW-30} ${y+42} H${keyX+30} Q${keyX+20} ${y+42} ${keyX+16} ${y+34} L${keyX+8} ${y+18} Q${keyX+4} ${y+8} ${keyX+12} ${y+8} Z" fill="${keyLight}" opacity=".52"/>
            <text x="${keyX+keyW/2}" y="${y+38}" text-anchor="middle" font-size="${fontSize}" font-weight="1000" fill="${textFill}" font-family="Arial Rounded MT Bold, Arial, sans-serif">${escapeXml(chars[i] || '')}</text>
          </g>`;
      }
      svg.innerHTML = out;
    }

    function escapeXml(s){
      return String(s).replace(/[&<>\"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }

    function update(){
      const upper = $('textInput').value.toLocaleUpperCase('id-ID');
      if($('textInput').value !== upper) $('textInput').value = upper;
      state.text = upper;
      syncTabs();
      buildPalette('casePalette', palette, c => c.name === state.caseColor.name, c => { state.caseColor = c; update(); });
      renderColorEditor();
      renderSvg();
    }

    function svgToPng(){
      return new Promise((resolve,reject)=>{
        const serialized = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([serialized], {type:'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const scale = 3;
          const canvas = document.createElement('canvas');
          canvas.width = svg.viewBox.baseVal.width * scale;
          canvas.height = svg.viewBox.baseVal.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#fff7fb';
          ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob((png)=> png ? resolve(png) : reject(new Error('Gagal membuat PNG')), 'image/png', 1);
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    async function saveImage(){
      try{
        const png = await svgToPng();
        const url = URL.createObjectURL(png);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${orderCode()}-zeez-studio.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
        toast('Gambar disimpan');
      }catch(e){
        toast('Gagal simpan gambar');
        console.error(e);
      }
    }

    function init(){
      $('textInput').addEventListener('input', update);
      $('tabTextBtn').onclick = () => { state.activeTab = 'text'; update(); };
      $('tabCaseBtn').onclick = () => { state.activeTab = 'case'; update(); };
      $('tabColorsBtn').onclick = () => { state.activeTab = 'colors'; update(); };
      $('modeKeycapsBtn').onclick = () => { state.colorMode = 'keycaps'; update(); };
      $('modeTextBtn').onclick = () => { state.colorMode = 'text'; update(); };
      $('activeColorSlotSelect').onchange = e => { state.activeColorSlot = Number(e.target.value); update(); };
      $('applyAllColorBtn').onclick = () => {
        if(state.colorMode === 'keycaps'){
          const c = state.keyColors[state.activeColorSlot] || palette[0];
          state.keyColors = Array(9).fill(c);
          toast('Warna keycaps diterapkan');
        } else {
          const c = state.legendColors[state.activeColorSlot] || palette[0];
          state.legendColors = Array(9).fill(c);
          toast('Warna tulisan diterapkan');
        }
        update();
      };
      $('saveImageBtn').onclick = saveImage;
      update();
    }
    init();
  </script>
</body>
</html>
