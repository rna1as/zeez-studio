<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZeeZ Studio Clickies Customizer V50 Mobile Optimized</title>
<style>
:root{--bg:#fff7fb;--card:#ffffff;--ink:#171717;--muted:#6b7280;--line:#eadfd2;--accent:#d81b8a;--shadow:0 18px 60px rgba(70,42,12,.14);--radius:24px;}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left, rgba(255,198,221,.58), transparent 34rem),linear-gradient(135deg,#fffaf5,#fff1f7 55%,#f6eefb)}
button,input{font-family:inherit}
.page{width:min(1240px,calc(100% - 28px));margin:0 auto;padding:24px 0 42px}
.welcome-panel{background:rgba(255,255,255,.90);border:1px solid rgba(234,223,210,.88);border-radius:28px;box-shadow:var(--shadow);padding:26px 22px 24px}
.welcome-brand{text-align:center;margin:0 0 8px;font-size:clamp(36px,5.2vw,58px);line-height:1;letter-spacing:-.06em;font-weight:1000;color:#111}.welcome-title{text-align:center;margin:0;font-size:clamp(24px,3.2vw,34px);line-height:1;letter-spacing:-.04em;font-weight:1000}
.welcome-sub{text-align:center;margin:8px auto 22px;color:var(--muted);font-size:13.5px;font-weight:850;max-width:860px}
.model-grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:16px}
.model-card{position:relative;appearance:none;text-align:center;border:2px solid #101010;border-radius:23px;background:#fff;padding:12px 12px 15px;min-height:250px;box-shadow:7px 7px 0 #101010;transition:.16s transform ease,.16s box-shadow ease,.16s border-color ease;cursor:pointer}
.model-card:hover:not(.disabled){transform:translate(-2px,-2px);box-shadow:9px 9px 0 #101010}
.model-card.active{border-color:#ff1493;box-shadow:7px 7px 0 #101010,0 0 0 4px #ff1493 inset}
.model-card.disabled{opacity:.82;cursor:not-allowed}
.model-photo{width:100%;aspect-ratio:1.12;border-radius:18px;overflow:hidden;background:#f3edf1;display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:#111;font-weight:900}
.model-photo img{width:100%;height:100%;object-fit:cover;display:block}
.model-name{font-weight:1000;font-size:16px;line-height:1.18;color:#000}
.coming{position:absolute;top:12px;right:12px;background:#111827;color:#fff;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900;display:none}
.disabled .coming{display:block}
.studio{display:none}
.topbar{display:grid;gap:14px;margin-bottom:18px}
.topbar-main{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%}
h1{font-size:clamp(30px,4vw,48px);line-height:1;margin:0;letter-spacing:-.04em;font-weight:1000}
.back-btn{border:1px solid #fecdd3;border-radius:999px;padding:10px 14px;background:#fff;color:#9f1239;font-weight:950;box-shadow:0 8px 18px rgba(0,0,0,.05);cursor:pointer}
.badge{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72);box-shadow:0 8px 24px rgba(0,0,0,.04);font-weight:900;color:#9f1239;white-space:nowrap}
.grid{display:grid;grid-template-columns:.82fr 1.38fr;gap:18px;align-items:start}
.panel{background:rgba(255,255,255,.84);border:1px solid rgba(234,223,210,.9);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.preview-card{padding:14px}
.canvas-wrap{position:relative;overflow:hidden;border-radius:20px;background:#f0dac1;border:1px solid #ead7c2}
canvas{display:block;width:100%;height:auto;aspect-ratio:1000/388}
.preview-tools{display:grid;grid-template-columns:1fr auto 1fr;align-items:flex-start;gap:14px;padding:12px 4px 0;color:var(--muted);font-size:13px}
.color-info{display:grid;gap:4px;color:#3f3f46;font-size:13px;font-weight:900;line-height:1.35}
.color-info .name{color:#18181b;font-weight:1000}
.model-info{min-width:180px;text-align:center;color:#52525b;font-size:13px;font-weight:900;line-height:1.35}
.model-info .model-value{display:block;color:#18181b;font-size:17px;font-weight:1000;letter-spacing:-.01em}
.price-info{min-width:160px;text-align:right;color:#52525b;font-size:13px;font-weight:900;line-height:1.35}
.price-info .price-value{display:block;color:#18181b;font-size:21px;font-weight:1000;letter-spacing:-.02em}
.preview-actions{display:grid;grid-template-columns:1fr;padding-top:12px}
.controls{padding:18px}
.section{padding:16px 0;border-bottom:1px solid var(--line)}
.section:first-child{padding-top:0} .section:last-child{border-bottom:0;padding-bottom:0}
label,.label{display:block;font-size:13px;font-weight:1000;letter-spacing:.02em;margin-bottom:9px}
#textInput{width:100%;border:1px solid #ead9e1;border-radius:16px;padding:15px 16px;font-size:15px;font-weight:1000;letter-spacing:0;outline:0;background:#fff;color:#111827;box-shadow:none;font-family:inherit}
#textInput:focus{border-color:#ff8fbd;box-shadow:0 0 0 4px rgba(255,205,224,.42)}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,minmax(98px,1fr));gap:10px;margin-top:12px}
.color-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px;border:1px solid var(--line);border-radius:18px;background:#fff7ed;margin-bottom:12px}
.color-tab{border-radius:13px;padding:11px 8px;background:transparent;color:var(--muted);border:0;box-shadow:none;font-size:13px;font-weight:950;cursor:pointer}
.color-tab.active{background:#111827;color:#fff;box-shadow:0 10px 20px rgba(15,23,42,.16)}
.swatch{min-height:52px;border-radius:15px;border:2px solid #111;box-shadow:4px 5px 0 #111;cursor:pointer;transition:.14s transform ease,.14s box-shadow ease;display:flex;align-items:center;justify-content:center;padding:8px 10px;font-size:12px;font-weight:1000;line-height:1.05;text-align:center;background:var(--swatch-bg);color:var(--swatch-fg);text-shadow:0 1px 0 rgba(0,0,0,.12)}
.swatch:hover{transform:translate(-1px,-1px);box-shadow:6px 6px 0 #111}
.swatch.active{outline:3px solid #e0007a;outline-offset:-6px}
.swatch[data-color="#ffffff"],.swatch[data-color="#f3d7a5"],.swatch[data-color="#c7c9cc"],.swatch[data-color="#d8dce0"],.swatch[data-color="#fff114"]{text-shadow:none}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px;color:var(--ink);margin-top:10px;font-weight:800}
.toggle input{width:18px;height:18px;accent-color:#e11d48}
button.primary{appearance:none;border:0;border-radius:16px;padding:14px;font-weight:1000;background:linear-gradient(135deg,#e11d48,#fb7185);color:#fff;box-shadow:0 14px 28px rgba(225,29,72,.24);cursor:pointer}
@media (max-width:1020px){.model-grid{grid-template-columns:repeat(3,1fr)}}
@media (max-width:940px){.grid{grid-template-columns:1fr}.controls{order:1}.preview-card{order:2}.topbar-main{align-items:center;justify-content:space-between;flex-direction:row;width:100%}.model-grid{grid-template-columns:repeat(2,minmax(130px,1fr))}.model-card{min-height:220px}}
@media (max-width:540px){.page{width:min(100% - 18px,1240px);padding-top:12px}.welcome-panel{padding:18px 12px}.model-grid{gap:12px}.model-name{font-size:14px}.topbar-main{gap:10px}.back-btn{padding:9px 12px}.preview-tools{grid-template-columns:1fr}.model-info{text-align:left}.price-info{text-align:left}}
</style>
</head>
<body>
<main class="page">
  <section id="welcomeView" class="welcome-panel">
    <h1 class="welcome-brand">Zeez Studio</h1>
    <h2 class="welcome-title">Pilih Model Clickies</h2>
    <p class="welcome-sub">Pilih bentuk produk dulu, lalu lanjut custom teks, warna case, warna keycaps, dan warna tulisan.</p>
    <div class="model-grid" id="modelGrid"></div>
  </section>

  <section id="studioView" class="studio">
    <div class="topbar">
      <div class="topbar-main">
        <h1>ZeeZ Studio</h1>
        <button class="back-btn" id="backBtn" type="button">← Pilih Model</button>
      </div>
      <div class="badge">Model yg dipilih: <span id="activeModelName">Klasik</span></div>
    </div>
    <div class="grid">
      <aside class="panel controls">
        <div class="section">
          <label for="textInput">Input karakter</label>
          <input id="textInput" type="text" maxlength="9" value="" autocomplete="off" spellcheck="false" />
        </div>
        <div class="section">
          <div class="label">Pilih warna</div>
          <div class="color-tabs" role="tablist" aria-label="Pilihan warna produk">
            <button class="color-tab active" type="button" data-target="caseColor">Case</button>
            <button class="color-tab" type="button" data-target="keyColor">Keycaps</button>
            <button class="color-tab" type="button" data-target="textColor">Teks</button>
          </div>
          <input id="caseColor" type="hidden" value="#f3a0b9" />
          <input id="keyColor" type="hidden" value="#ffffff" />
          <input id="textColor" type="hidden" value="#0b0b0b" />
          <div id="colorPalette" class="swatches"></div>
        </div>
        <div class="section">
          <label class="toggle"><span>Efek huruf timbul / raised letter</span><input id="raisedText" type="checkbox"></label>
          <label class="toggle"><span>Bayangan produk realistis</span><input id="realShadow" type="checkbox"></label>
        </div>
      </aside>
      <section class="panel preview-card">
        <div class="canvas-wrap"><canvas id="previewCanvas" width="1000" height="388" aria-label="Preview produk"></canvas></div>
        <div class="preview-tools">
          <div class="color-info" aria-live="polite">
            <div>Case = <span class="name" id="caseInfo">Sakura Pink</span></div>
            <div>Keycaps = <span class="name" id="keyInfo">White</span></div>
            <div>Teks = <span class="name" id="textInfo">Black</span></div>
          </div>
          <div class="model-info" aria-live="polite"><span>Model</span><span class="model-value" id="previewModelInfo">Klasik</span></div>
          <div class="price-info" aria-live="polite"><span class="price-value" id="priceInfo">Rp 19.500</span></div>
        </div>
        <div class="preview-actions"><button class="primary" id="downloadBtn" type="button">Simpan Gambar</button></div>
      </section>
    </div>
  </section>
</main>

  function renderWafer(chars){
    drawCleanWood(); const n=Math.max(chars.length,1); const caseHex=caseColor.value,keyHex=keyColor.value,textHex=textColor.value;
    const size=clamp(760/(n*.92+.35),74,142); const capW=size*.58, stepX=size*.72, gap=Math.max(size*.105,stepX-capW), totalW=capW+(n-1)*stepX, sideOverhang=gap*1.05, barW=totalW+sideOverhang*2, barH=size*.58, barY=-size*.02;
    ctx.save(); ctx.translate(canvas.width/2,canvas.height/2+size*.16); drawWaferBar(-barW/2,barY,barW,barH,caseHex);
    for(let i=0;i<n;i++){ const cx=-totalW/2+capW/2+i*stepX; drawWaferSwitch(cx,size*.12,size); drawWaferCap(cx,-size*.075,size,keyHex,textHex,chars[i]||''); }
    ctx.restore();
  }

  function flowerPath(c,cx,cy,r){ const petals=6; c.beginPath(); for(let i=0;i<petals;i++){ const a=-Math.PI/2+i*2*Math.PI/petals; const an=-Math.PI/2+(i+1)*2*Math.PI/petals; const x1=cx+Math.cos(a)*r*.62,y1=cy+Math.sin(a)*r*.62; const cp1x=cx+Math.cos(a+.22)*r*.96,cp1y=cy+Math.sin(a+.22)*r*.96; const cp2x=cx+Math.cos(an-.22)*r*.96,cp2y=cy+Math.sin(an-.22)*r*.96; const x2=cx+Math.cos(an)*r*.62,y2=cy+Math.sin(an)*r*.62; if(i===0)c.moveTo(x1,y1); c.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x2,y2); } c.closePath(); }
  function renderFlower(chars){ drawCleanWood(); const ch=(chars[0]||'').toUpperCase(); const caseHex=caseColor.value,keyHex=keyColor.value,textHex=textColor.value; const cx=canvas.width/2, cy=canvas.height/2+22, r=95; if(realShadow.checked){ctx.save();ctx.translate(6,10);ctx.filter='blur(6px)';flowerPath(ctx,cx,cy,r*.88);ctx.fillStyle='rgba(0,0,0,.14)';ctx.fill();ctx.restore();} flowerPath(ctx,cx,cy,r*.88); ctx.fillStyle=caseHex; ctx.fill(); flowerPath(ctx,cx,cy,r*.70); ctx.strokeStyle=rgba(shade(textHex,-.45),.65); ctx.lineWidth=4; ctx.stroke(); flowerPath(ctx,cx,cy,r*.66); ctx.fillStyle=keyHex; ctx.fill(); drawLetter(ch,cx,cy+2,r*.75,textHex,raisedText.checked); }

  function renderPalette(targetId=activeColorTarget){ activeColorTarget=targetId; document.querySelectorAll('.color-tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.target===activeColorTarget)); const currentValue=document.getElementById(activeColorTarget).value.toLowerCase(); colorPalette.innerHTML=COLOR_PALETTE.map(c=>`<button class="swatch${c.hex.toLowerCase()===currentValue?' active':''}" type="button" title="${c.name}" style="--swatch-bg:${c.hex}; --swatch-fg:${c.fg}" data-color="${c.hex}">${c.name}</button>`).join(''); }
  function updateInfo(){ caseInfo.textContent=colorName(caseColor.value); keyInfo.textContent=colorName(keyColor.value); textInfo.textContent=colorName(textColor.value); previewModelInfo.textContent=MODELS[currentModelId].name; priceInfo.textContent=formatRupiah(currentPrice()); }
  function render(){ renderPalette(activeColorTarget); updateInfo(); const chars=getChars(); if(currentModelId==='heart') renderHeart(chars); else if(currentModelId==='heartFlex') renderHeartFlex(chars); else if(currentModelId==='flower') renderFlower(chars); else if(currentModelId==='wafer') renderWafer(chars); else if(currentModelId==='curve') renderCurve(chars); else if(currentModelId==='flex') renderFlex(chars); else if(currentModelId==='flexThick') renderFlexThick(chars); else renderClassic(chars); }

  function setModel(id){ if(!MODELS[id]) return; currentModelId=id; const m=MODELS[id]; input.maxLength=maxCharsForModel(id); caseColor.value=m.defaults.case; keyColor.value=m.defaults.key; textColor.value=m.defaults.text; input.value=normalizeInputText(sharedCustomText,maxCharsForModel(id)); activeModelName.textContent=m.name; welcomeView.style.display='none'; studioView.style.display='block'; scheduleRender(); window.scrollTo({top:0,behavior:'smooth'}); }
  function goWelcome(){ studioView.style.display='none'; welcomeView.style.display='block'; window.scrollTo({top:0,behavior:'smooth'}); }
  function drawMenu(){ modelGrid.innerHTML=MENU_MODELS.map((m,idx)=>{ const thumb=m.thumb?`<img src="${m.thumb}" alt="${m.name}">`:`<span>${m.icon||m.name}</span>`; const activeClass=idx===0?' active':''; return `<button type="button" class="model-card ${m.active?'':'disabled'}${activeClass}" data-model="${m.id}" ${m.active?'':'aria-disabled="true"'}><span class="coming">Soon</span><div class="model-photo">${thumb}</div><div class="model-name">${m.name}</div></button>`; }).join(''); }

  function makeExportCanvas(){ render(); const exportW=1600, productH=620, infoH=150, exportH=productH+infoH; const out=document.createElement('canvas'); out.width=exportW; out.height=exportH; const ex=out.getContext('2d'); ex.clearRect(0,0,exportW,exportH); ex.fillStyle='#fff'; roundRect(ex,0,0,exportW,exportH,34); ex.fill(); ex.save(); roundRect(ex,0,0,exportW,productH,34); ex.clip(); ex.drawImage(canvas,0,0,exportW,productH); ex.restore(); ex.fillStyle='#fff'; ex.fillRect(0,productH-2,exportW,infoH+2); const leftX=34, topY=productH+35; ex.textBaseline='alphabetic'; ex.textAlign='left'; ex.fillStyle='#3f3f46'; ex.font='900 24px Inter, Arial, sans-serif'; ex.fillText(`Case = ${colorName(caseColor.value)}`,leftX,topY); ex.fillText(`Keycaps = ${colorName(keyColor.value)}`,leftX,topY+46); ex.fillText(`Teks = ${colorName(textColor.value)}`,leftX,topY+92); ex.textAlign='center'; ex.fillStyle='#3f3f46'; ex.font='900 22px Inter, Arial, sans-serif'; ex.fillText('Model', exportW/2, topY); ex.fillStyle='#18181b'; ex.font='1000 30px Inter, Arial, sans-serif'; ex.fillText(MODELS[currentModelId].name, exportW/2, topY+42); ex.textAlign='right'; ex.fillStyle='#18181b'; ex.font='1000 44px Inter, Arial, sans-serif'; ex.fillText(formatRupiah(currentPrice()),exportW-34,topY+60); return out; }
  let renderTimer=null;
  function scheduleRender(){
    clearTimeout(renderTimer);
    renderTimer=setTimeout(()=>requestAnimationFrame(render),90);
  }
  function download(){ const exportCanvas=makeExportCanvas(); const modelName=MODELS[currentModelId].name.toLowerCase().replace(/\s+/g,'-'); const name=(input.value||'CUSTOM').replace(/[^A-Z0-9_♥❤-]/gi,'')||'CUSTOM'; const a=document.createElement('a'); a.href=exportCanvas.toDataURL('image/png'); a.download=`preview-${modelName}-${name}.png`; document.body.appendChild(a); a.click(); a.remove(); }

  input.addEventListener('input',()=>{ sharedCustomText=normalizeInputText(input.value,9); scheduleRender(); });
  [raisedText,realShadow].forEach(el=>{ el.addEventListener('input',scheduleRender); el.addEventListener('change',scheduleRender); });
  document.querySelectorAll('.color-tab').forEach(tab=>tab.addEventListener('click',()=>renderPalette(tab.dataset.target)));
  colorPalette.addEventListener('click',e=>{ const btn=e.target.closest('.swatch'); if(!btn) return; document.getElementById(activeColorTarget).value=btn.dataset.color; scheduleRender(); });
  document.getElementById('downloadBtn').addEventListener('click',download);
  backBtn.addEventListener('click',goWelcome);
  modelGrid.addEventListener('click',e=>{ const card=e.target.closest('.model-card'); if(!card || card.classList.contains('disabled')) return; setModel(card.dataset.model); });

  drawMenu(); renderPalette(activeColorTarget); render();
})();
</script>
</body>
